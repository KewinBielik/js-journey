</head>
<body>

    <h1>Box model experiments</h1>
    <p>Change <code>styles.css</code> one property at a time and refresh.</p>

    <div class="card">
        <h2>Card one</h2>
        <p>Padding adds space inside this box.</p>
    </div>

    <div class="card highlight">
        <h2>Card two (highlight)</h2>
        <p>Try different padding or margin on this one.</p>
    </div>

    <div class="card">
        <h2>Card three</h2>
        <p>Margin adds space between boxes.</p>
    </div>

</body>
