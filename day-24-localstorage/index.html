<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 24 — Todo List (now with memory)</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 520px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h1 { margin-bottom: 0.25rem; }
        .add-row {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        #taskInput {
            flex: 1;
            padding: 0.6rem;
            font-size: 1rem;
        }
        button {
            padding: 0.5rem 0.9rem;
            cursor: pointer;
        }
        #taskList {
            list-style: none;
            padding: 0;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.75rem;
            margin: 0.35rem 0;
            background: #f3f4f6;
            border-radius: 8px;
        }
        .task-item.done .task-title {
            text-decoration: line-through;
            color: #6b7280;
        }
        .task-title {
            flex: 1;
        }
        .btn-done {
            background: #dcfce7;
            border: 1px solid #86efac;
            border-radius: 4px;
        }
        .btn-delete {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            border-radius: 4px;
        }
        #remainingCount {
            color: #4b5563;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <h1>Todo List</h1>
    <p id="remainingCount">0 tasks remaining</p>

    <div class="add-row">
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <button id="addBtn">Add</button>
    </div>

    <ul id="taskList"></ul>

    <script src="script.js"></script>
</body>
</html>
